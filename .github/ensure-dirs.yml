name: Setup Runtime Directories

# Triggers: manual dispatch or any push to main
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - 'log/**'
      - 'answer/**'

jobs:
  ensure-dirs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Ensure log/ and answer/ directories exist
        run: |
          mkdir -p log answer
          touch log/.gitkeep answer/.gitkeep

      - name: Commit if directories were missing
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add log/.gitkeep answer/.gitkeep
          if git diff --cached --quiet; then
            echo "Nothing to commit — directories already present."
          else
            git commit -m "chore: ensure log/ and answer/ runtime directories exist [skip ci]"
            git push
          fi
